services:
  - type: web
    name: cbmerj-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: cbmerj-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist --listen $PORT
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: VITE_API_URL
        value: https://cbm-quantify-hub.onrender.com
